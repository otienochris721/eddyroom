<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EddyRoom | Pro Workspace</title>
    <script src="https://8x8.vc/external_api.js"></script>
    <style>
        :root { --gold: #fdd835; --bg: #0b0b0b; --panel: #1a1a1a; --text: #fff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Navigation */
        nav { 
            background: var(--panel); 
            padding: 0 5%; 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 60px;
            box-sizing: border-box;
            z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; }
        .logo span { color: var(--gold); }
        .status-box { color: var(--gold); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }

        /* Meeting Container */
        #meet-frame { width: 100%; height: calc(100vh - 60px); background: #000; position: relative; }

        /* Lobby UI */
        .lobby {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: var(--panel); padding: 40px; border-radius: 15px;
            border: 1px solid #333; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10;
        }
        .lobby h2 { margin-top: 0; color: var(--gold); }
        .lobby p { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        
        .btn-start {
            background: var(--gold); color: #000; border: none; padding: 18px; 
            font-weight: 800; border-radius: 8px; cursor: pointer; width: 100%; 
            font-size: 1rem; transition: 0.3s;
        }
        .btn-start:hover { background: #ffea00; transform: scale(1.02); }

        iframe { border: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EDDY<span>ROOM</span></div>
        <div id="active-status" class="status-box">● Workspace Standby</div>
    </nav>

    <div id="meet-frame">
        <div class="lobby" id="lobby">
            <h2>Workspace</h2>
            <p>Entering Unlimited Video Meeting<br>using 8x8 Professional Server.</p>
            <button class="btn-start" onclick="initMeeting()">Join Meeting</button>
        </div>
    </div>

    <audio id="ping-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script>
        let api = null;

        function initMeeting() {
            // 1. Clear Lobby
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('active-status').innerText = "● LIVE SESSION ACTIVE";

            // 2. Setup 8x8 Domain (Unlimited)
            const domain = '8x8.vc';
            const options = {
                // Using the vpaas-magic-cookie allows for longer sessions on 8x8
                roomName: 'vpaas-magic-cookie-887766554433221100/EddyRoom721', 
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-frame'),
                userInfo: { displayName: 'Workspace Guest' },
                configOverwrite: {
                    prejoinPageEnabled: false,
                    startWithAudioMuted: true,
                    disableChat: false,
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: [
                        'chat', 'microphone', 'camera', 'desktop', 'raisehand', 
                        'fullscreen', 'hangup', 'settings', 'tileview', 'invite'
                    ],
                    SHOW_JITSI_WATERMARK: false,
                    DEFAULT_BACKGROUND: '#0b0b0b'
                }
            };

            // 3. Start API
            api = new JitsiMeetExternalAPI(domain, options);

            // --- AUTO-CHAT FIX (2 Second Delay) ---
            api.addEventListener('videoConferenceJoined', () => {
                setTimeout(() => {
                    api.executeCommand('toggleChat');
                }, 2000); 
            });

            // --- AUDIO MESSAGE PING ---
            api.on('incomingMessage', () => {
                const sound = document.getElementById('ping-sound');
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Sound interaction required"));
            });

            // Return to Lobby on Exit
            api.addEventListener('videoConferenceLeft', () => {
                location.reload(); 
            });
        }
    </script>
</body>
</html>
