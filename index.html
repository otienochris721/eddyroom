<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EddyRoom | Pro Workspace</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --gold: #fdd835; --bg: #0b0b0b; --panel: #1a1a1a; --text: #fff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* Navigation Bar */
        nav { 
            background: var(--panel); 
            padding: 0 5%; 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 60px;
            box-sizing: border-box;
            z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; }
        .logo span { color: var(--gold); }
        .status-text { color: var(--gold); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }

        /* Container */
        #meet-frame { width: 100%; height: calc(100vh - 60px); background: #000; position: relative; }

        /* Start Screen */
        .lobby {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: var(--panel); padding: 45px; border-radius: 20px;
            border: 1px solid #333; width: 340px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 10;
        }
        .lobby h2 { margin: 0 0 10px 0; color: var(--gold); font-size: 1.8rem; }
        .lobby p { color: #888; font-size: 0.9rem; margin-bottom: 30px; line-height: 1.5; }
        
        .btn-start {
            background: var(--gold); color: #000; border: none; padding: 18px; 
            font-weight: 800; border-radius: 10px; cursor: pointer; width: 100%; 
            font-size: 1.1rem; transition: 0.3s; text-transform: uppercase;
        }
        .btn-start:hover { background: #ffea00; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(253, 216, 53, 0.3); }

        iframe { border: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EDDY<span>ROOM</span></div>
        <div class="status-box">
            <span class="status-text">● SECURE WORKSPACE</span>
        </div>
    </nav>

    <div id="meet-frame">
        <div class="lobby" id="lobby">
            <h2>Workspace</h2>
            <p>Private video conferencing with <br> <b>Instant Chat & Notifications</b></p>
            <button class="btn-start" onclick="initMeeting()">Enter Meeting</button>
        </div>
    </div>

    <audio id="ping-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script>
        let api = null;

        function initMeeting() {
            // Hide Lobby
            document.getElementById('lobby').style.display = 'none';

            const domain = 'meet.jit.si';
            const options = {
                // FIXED UNIQUE NAME: Prevents "Demo" warnings and keeps room consistent
                roomName: 'EddyRoom_Private_Alpha_Workspace_721', 
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-frame'),
                configOverwrite: {
                    prejoinPageEnabled: false,
                    startWithAudioMuted: true,
                    disableChat: false,
                    hideConferenceTimer: false,
                    // Security fix to prevent embedding blocks
                    enableNoAudioDetection: true,
                    enableNoVideoDetection: true
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: [
                        'chat', 'microphone', 'camera', 'desktop', 'raisehand', 
                        'fullscreen', 'hangup', 'profile', 'settings', 'tileview'
                    ],
                    SHOW_JITSI_WATERMARK: false,
                    DEFAULT_BACKGROUND: '#0b0b0b'
                }
            };

            // Start Jitsi
            api = new JitsiMeetExternalAPI(domain, options);

            // --- FEATURE: AUTO-OPEN CHAT (With 2.5s Delay) ---
            api.addEventListener('videoConferenceJoined', () => {
                setTimeout(() => {
                    api.executeCommand('toggleChat');
                }, 2500);
            });

            // --- FEATURE: AUDIO NOTIFICATION ---
            api.on('incomingMessage', () => {
                const sound = document.getElementById('ping-sound');
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Sound interaction required."));
            });

            // Return to lobby on exit
            api.addEventListener('videoConferenceLeft', () => {
                location.reload(); 
            });
        }
    </script>
</body>
</html>
