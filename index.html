<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EddyRoom | Pro Workspace</title>
    <style>
        :root { --gold: #fdd835; --bg: #0b0b0b; --panel: #1a1a1a; --text: #fff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* Nav Bar */
        nav { 
            background: var(--panel); padding: 0 5%; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-between; align-items: center;
            height: 60px; box-sizing: border-box; z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; }
        .logo span { color: var(--gold); }
        .btn-share {
            background: var(--gold); color: #000; border: none; padding: 8px 15px;
            font-weight: 800; border-radius: 5px; cursor: pointer; font-size: 0.7rem;
            display: none; transition: 0.3s;
        }

        /* Container */
        #meet-frame { width: 100%; height: calc(100vh - 60px); background: #000; position: relative; }

        /* Lobby UI */
        .lobby {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: var(--panel); padding: 45px; border-radius: 20px;
            border: 1px solid #333; width: 340px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 10;
        }
        .lobby h2 { margin: 0 0 10px 0; color: var(--gold); }
        .btn-start {
            background: var(--gold); color: #000; border: none; padding: 18px; 
            font-weight: 800; border-radius: 10px; cursor: pointer; width: 100%; 
            font-size: 1.1rem; text-transform: uppercase;
        }

        /* Video Frame */
        iframe { width: 100%; height: 100%; border: none; display: none; }

        #toast {
            position: fixed; top: 75px; right: 20px; background: var(--gold); color: #000;
            padding: 10px 20px; border-radius: 5px; font-weight: bold; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EDDY<span>ROOM</span></div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button id="share-btn" class="btn-share" onclick="copyRoom()">🔗 SHARE MEETING</button>
            <div id="status" style="color: var(--gold); font-size: 0.7rem; font-weight: bold;">● STANDBY</div>
        </div>
    </nav>

    <div id="toast">✅ Room Link Copied!</div>

    <div id="meet-frame">
        <div class="lobby" id="lobby">
            <h2>Workspace</h2>
            <p style="color:#888; font-size:0.9rem; margin-bottom:25px;">Private Video Room<br><b>Unlimited Time • No Login</b></p>
            <button class="btn-start" onclick="startMeeting()">Join Meeting</button>
        </div>
        
        <iframe id="video-iframe" allow="camera; microphone; display-capture; autoplay; clipboard-write"></iframe>
    </div>

    <script>
        // Unique Room ID for your session
        const ROOM_ID = "EddyRoom_Private_721_Workspace";

        function startMeeting() {
            const iframe = document.getElementById('video-iframe');
            const lobby = document.getElementById('lobby');
            const shareBtn = document.getElementById('share-btn');
            const status = document.getElementById('status');

            // Switch to MiroTalk P2P (Bypasses Jitsi 5-min demo error)
            iframe.src = `https://p2p.mirotalk.com/join/${ROOM_ID}`;
            
            lobby.style.display = 'none';
            iframe.style.display = 'block';
            shareBtn.style.display = 'block';
            status.innerHTML = "<span style='color:#4CAF50'>● LIVE SESSION</span>";
        }

        function copyRoom() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            });
        }
    </script>
</body>
</html>
