<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EddyRoom | Pro Workspace</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --gold: #fdd835; --bg: #0b0b0b; --panel: #1a1a1a; --text: #fff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Navigation */
        nav { 
            background: var(--panel); 
            padding: 15px 5%; 
            border-bottom: 2px solid var(--gold); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 60px;
            box-sizing: border-box;
        }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 1px; }
        .logo span { color: var(--gold); }
        .status { color: var(--gold); font-size: 0.8rem; font-weight: bold; }

        /* Meeting Container */
        #meet-frame { 
            width: 100%; 
            height: calc(100vh - 60px); 
            background: #000;
            position: relative;
        }

        /* Lobby UI (The Start Screen) */
        .lobby {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: var(--panel);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #333;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .lobby h2 { margin-top: 0; color: var(--gold); }
        .lobby p { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        
        .btn-start {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-start:hover { background: #ffea00; transform: scale(1.02); }

        /* Fullscreen Iframe Fix */
        iframe { border: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EDDY<span>ROOM</span></div>
        <div class="status">● SECURE SERVER</div>
    </nav>

    <div id="meet-frame">
        <div class="lobby" id="lobby">
            <h2>Workspace</h2>
            <p>Enter the private meeting room.<br>No payment or login required.</p>
            <button class="btn-start" onclick="initMeeting()">Join Meeting</button>
        </div>
    </div>

    <script>
        function initMeeting() {
            // 1. Hide the start button/lobby
            document.getElementById('lobby').style.display = 'none';

            // 2. Setup Jitsi Options
            const domain = 'meet.jit.si';
            const options = {
                roomName: 'EddyRoom-Private-Workspace-721', // This is your unique room ID
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-frame'),
                userInfo: {
                    displayName: 'Member'
                },
                configOverwrite: {
                    startWithAudioMuted: true,
                    prejoinPageEnabled: false, // Jumps straight into the meeting
                    disableThirdPartyRequests: true
                },
                interfaceConfigOverwrite: {
                    // This keeps the interface clean
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                        'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
                        'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
                        'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
                        'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone',
                        'security'
                    ],
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false,
                    DEFAULT_BACKGROUND: '#0b0b0b'
                }
            };

            // 3. Start the Video API
            const api = new JitsiMeetExternalAPI(domain, options);

            // 4. Optional: Handle hangup (return to lobby)
            api.addEventListener('videoConferenceLeft', () => {
                location.reload(); 
            });
        }
    </script>
</body>
</html>
