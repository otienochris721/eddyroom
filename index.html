<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EddyRoom | Pro Workspace</title>
    <script src="https://meeet.live/external_api.js"></script>
    <style>
        :root { --gold: #fdd835; --bg: #0b0b0b; --panel: #1a1a1a; --text: #fff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        nav { 
            background: var(--panel); padding: 0 5%; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; }
        .logo span { color: var(--gold); }
        .share-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; font-weight: 800; border-radius: 5px; cursor: pointer; display: none; }

        #meet-frame { width: 100%; height: calc(100vh - 60px); background: #000; position: relative; }
        .lobby {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: var(--panel); padding: 45px; border-radius: 20px;
            border: 1px solid #333; width: 340px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 10;
        }
        .btn-start { background: var(--gold); color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.1rem; }
        
        #jitsi-container { width: 100%; height: 100%; display: none; }
        iframe { border: none !important; width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EDDY<span>ROOM</span></div>
        <button id="share-link" class="share-btn" onclick="copyUrl()">🔗 SHARE LINK</button>
    </nav>

    <div id="meet-frame">
        <div class="lobby" id="lobby">
            <h2 style="color:var(--gold)">Workspace</h2>
            <p style="color:#888; font-size:0.9rem; margin-bottom:25px;">Unlimited Private Video & Chat<br><b>No Login Required</b></p>
            <button class="btn-start" onclick="initMeeting()">Enter Meeting</button>
        </div>
        <div id="jitsi-container"></div>
    </div>

    <script>
        function initMeeting() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('jitsi-container').style.display = 'block';
            document.getElementById('share-link').style.display = 'block';

            // Switching to meeet.live domain to bypass "Not Allowed" login error
            const domain = 'meeet.live';
            const options = {
                roomName: 'EddyRoom_Pro_Workspace_721_DirectAccess',
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#jitsi-container'),
                configOverwrite: {
                    prejoinPageEnabled: false,
                    startWithAudioMuted: true,
                    disableThirdPartyRequests: false,
                    enableWelcomePage: false
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['chat', 'microphone', 'camera', 'desktop', 'hangup', 'settings', 'tileview'],
                    SHOW_JITSI_WATERMARK: false,
                }
            };

            const api = new JitsiMeetExternalAPI(domain, options);

            // AUTO-FIX: Force video display permissions
            api.addEventListener('videoConferenceJoined', () => {
                const iframe = document.querySelector('iframe');
                if (iframe) {
                    iframe.setAttribute("allow", "camera; microphone; display-capture; autoplay; clipboard-write; speaker-selection");
                }
                // Open Chat automatically
                setTimeout(() => { api.executeCommand('toggleChat'); }, 2000);
            });
        }

        function copyUrl() {
            navigator.clipboard.writeText(window.location.href);
            alert("Meeting link copied! You can now send it to others.");
        }
    </script>
</body>
</html>
