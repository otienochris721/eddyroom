<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EddyRoom | Pro Workspace</title>
    <script src="https://8x8.vc/external_api.js"></script>
    <style>
        :root { --gold: #fdd835; --bg: #0b0b0b; --panel: #1a1a1a; --text: #fff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }

        nav { 
            background: var(--panel); padding: 0 5%; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; 
        }
        .logo { font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; }
        .logo span { color: var(--gold); }
        .share-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; font-weight: 800; border-radius: 5px; cursor: pointer; display: none; font-size: 0.75rem; }

        #meet-frame { width: 100%; height: calc(100vh - 60px); background: #000; position: relative; }
        .lobby {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: var(--panel); padding: 40px; border-radius: 15px;
            border: 1px solid #333; width: 320px; z-index: 10;
        }
        .btn-start { background: var(--gold); color: #000; border: none; padding: 18px; font-weight: 800; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; }
        
        #video-container { width: 100%; height: 100%; display: none; }
        iframe { border: none !important; width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EDDY<span>ROOM</span></div>
        <button id="share-link" class="share-btn" onclick="copyUrl()">🔗 SHARE MEETING LINK</button>
    </nav>

    <div id="meet-frame">
        <div class="lobby" id="lobby">
            <h2 style="color:var(--gold)">Workspace</h2>
            <p style="color:#888; font-size:0.9rem; margin-bottom:25px;">Unlimited Video & Chat<br><b>Stable Connection</b></p>
            <button class="btn-start" onclick="initMeeting()">Enter Meeting</button>
        </div>
        <div id="video-container"></div>
    </div>

    <script>
        function initMeeting() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('share-link').style.display = 'block';

            // Using 8x8.vc - The most reliable domain for GitHub invitation links
            const domain = '8x8.vc';
            const options = {
                // vpaas-magic-cookie allows for a permanent room that anyone can join
                roomName: 'vpaas-magic-cookie-8877665544332211/EddyRoomProWorkspace721',
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#video-container'),
                configOverwrite: {
                    prejoinPageEnabled: false,
                    startWithAudioMuted: true,
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['chat', 'microphone', 'camera', 'desktop', 'hangup', 'settings'],
                    SHOW_JITSI_WATERMARK: false,
                }
            };

            const api = new JitsiMeetExternalAPI(domain, options);

            // Fix for the "Black Screen" (Screenshot 18)
            api.on('videoConferenceJoined', () => {
                const iframe = document.querySelector('iframe');
                if (iframe) {
                    // Manually forces the browser to allow camera/mic access
                    iframe.setAttribute("allow", "camera; microphone; display-capture; autoplay; clipboard-write; speaker-selection");
                }
            });
        }

        function copyUrl() {
            // Copies the website link so your friends join your specific workspace
            navigator.clipboard.writeText(window.location.href);
            alert("Invite link copied! Send this to your friends.");
        }
    </script>
</body>
</html>
