<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EddyRoom | Pro Workspace</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --gold: #fdd835; --bg: #0b0b0b; --panel: #1a1a1a; --text: #fff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        nav { 
            background: var(--panel); padding: 0 5%; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; 
        }
        .logo { font-weight: 900; font-size: 1.3rem; }
        .logo span { color: var(--gold); }
        .chat-indicator { color: var(--gold); font-size: 0.75rem; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #meet-frame { width: 100%; height: calc(100vh - 60px); background: #000; position: relative; }

        .lobby {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: var(--panel); padding: 40px; border-radius: 15px;
            border: 1px solid #333; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10;
        }
        .btn-start {
            background: var(--gold); color: #000; border: none; padding: 18px; 
            font-weight: 800; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EDDY<span>ROOM</span></div>
        <div id="chat-status" class="chat-indicator" style="display:none;">💬 AUTO-CHAT INITIALIZING...</div>
    </nav>

    <div id="meet-frame">
        <div class="lobby" id="lobby">
            <h2 style="color:var(--gold)">Workspace</h2>
            <p style="color:#888; font-size:0.9rem">Connecting to Secure Jitsi Server...</p>
            <button class="btn-start" onclick="initMeeting()">Enter Meeting</button>
        </div>
    </div>

    <audio id="ping-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <script>
        let api = null;

        function initMeeting() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('chat-status').style.display = 'block';

            const domain = 'meet.jit.si';
            const options = {
                roomName: 'EddyRoom-Secure-721-Workspace', 
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-frame'),
                configOverwrite: {
                    prejoinPageEnabled: false,
                    startWithAudioMuted: true,
                    disableChat: false
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['chat', 'microphone', 'camera', 'desktop', 'raisehand', 'hangup', 'settings'],
                    SHOW_JITSI_WATERMARK: false,
                }
            };

            api = new JitsiMeetExternalAPI(domain, options);

            // --- THE AUTO-CHAT FIX ---
            api.addEventListener('videoConferenceJoined', () => {
                // Wait 2 seconds for the UI to load before forcing the chat open
                setTimeout(() => {
                    api.executeCommand('toggleChat');
                    document.getElementById('chat-status').innerText = "💬 CHAT ACTIVE";
                }, 2000); 
            });

            // Notification Sound
            api.on('incomingMessage', (event) => {
                const sound = document.getElementById('ping-sound');
                sound.play().catch(e => console.log("Sound ready"));
            });

            api.addEventListener('videoConferenceLeft', () => {
                location.reload(); 
            });
        }
    </script>
</body>
</html>
